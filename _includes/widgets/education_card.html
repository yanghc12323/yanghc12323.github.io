{% if site.data.profile.education %}
<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4">
                <h6 data-i18n="widgets.education">Education</h6>
                <ul class="list-unstyled mb-1">
                    {% for item in site.data.profile.education %}
                    <li class="media mb-1">
                        <img src="{{ item.logo | relative_url }}" alt="{{ item.name }}" style="width: 18px;" class="mr-1 mt-1">
                        <div class="media-body">
                            <div><span class="lang-en">{{ item.name }}</span><span class="lang-zh">{{ item.name_zh }}</span></div>
                            <div class="small d-flex">
                                <div><span class="lang-en">{{ item.position }}</span><span class="lang-zh">{{ item.position_zh }}</span></div>
                                <div class="mt-auto ml-auto no-break"><em>{{ item.date }}</em></div>
                            </div>
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
{% endif %}

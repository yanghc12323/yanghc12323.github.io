{% if site.data.profile.awards %}
<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4">
                <h6 data-i18n="widgets.honors_awards">Honors & Awards</h6>
                <ul class="list small pl-3 mb-1">
                    {% for item in site.data.profile.awards %}
                    <li>
                        <div class="d-flex">
                            <div><span class="lang-en">{{ item.name }}</span><span class="lang-zh">{{ item.name_zh }}</span></div>
                            <div class="ml-auto mt-auto no-break"><em>{{ item.date }}</em></div>
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
{% endif %}

short_bio_text_justify: true
short_bio: >-
  <p>
    I'm currently pursuing a B.S. in Mathematical Foundations & Industrial Engineering at Weiyang College, Tsinghua University (GPA: 3.7/4.0, top 30%).
    My research interests focus on <strong>Human-Computer Interaction, Intelligent System User Experience, Cognitive Ergonomics, and AI-Driven Interactive Systems</strong>.
  </p>
  <p>
    My undergraduate training has equipped me with a complete research skill chain spanning behavioral experiment design, physiological signal processing (fNIRS), and statistical modeling.
    I'm proficient in C++, Python, Objective-C, Swift, SQL, MATLAB (Homer3), SPSS, R, and SEM (Amos), with hands-on experience in Flask web development and iOS native development (Core Haptics).
  </p>
  <p>
    I have led and contributed to multiple research projects, including AI-patient communication emotional dynamics (HCII 2026, First Author), crossmodal consistency fNIRS studies (JNE, Second Author).
    Extensive student leadership experience (Deputy Secretary, Dushi College Youth League Committee; managing 450+ members) has further honed my abilities in project coordination and cross-team collaboration.
  </p>
short_bio_zh: >-
  <p>
    目前于清华大学未央书院攻读数学基础与工业工程学士学位（GPA: 3.7/4.0，前30%）。
    研究方向聚焦于<strong>人机交互、智能系统用户体验、认知工效学以及AI驱动的交互系统</strong>。
  </p>
  <p>
    本科训练使我掌握了涵盖行为实验设计、生理信号处理（fNIRS）和统计建模的完整研究技能链。
    熟练使用 C++、Python、Objective-C、Swift、SQL、MATLAB（Homer3）、SPSS、R 和 SEM（Amos），并具有 Flask 网页开发和 iOS 原生开发（Core Haptics）的实践经验。
  </p>
  <p>
    主导和参与多项科研项目，包括 AI-医患沟通情绪动力学研究（HCII 2026，第一作者）、跨模态一致性 fNIRS 研究（JNE，第二作者）。
    丰富的学生工作经历（担任笃实书院团委副书记，管理450+成员）进一步锻炼了项目统筹与跨团队协作能力。
  </p>

